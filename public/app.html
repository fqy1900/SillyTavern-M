<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SillyTavern</title>
    <link rel="stylesheet" type="text/css" href="css/st-tailwind.css">
    <link rel="stylesheet" type="text/css" href="css/app.css">
    <link href="webfonts/NotoSans/stylesheet.css" rel="stylesheet">
    <link href="css/fontawesome.min.css" rel="stylesheet">
    <link href="css/solid.min.css" rel="stylesheet">
</head>
<body class="app-page" style="display:none;">
    <!-- ============ 左边栏 ============ -->
    <aside id="sidebar" class="sidebar">
        <!-- 用户信息头部 -->
        <div id="sidebarHeader" class="sidebar-header">
            <div class="user-avatar-wrap">
                <img id="sidebarAvatar" src="img/user-default.png" alt="avatar" class="user-avatar">
                <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
            </div>
            <div class="user-info">
                <div id="sidebarNickname" class="user-nickname">加载中...</div>
                <div id="sidebarCredits" class="user-credits">
                    <i class="fa-solid fa-coins"></i>
                    <span id="sidebarCreditsNum">--</span> 积分
                </div>
            </div>
        </div>
        <!-- 菜单 -->
        <nav class="sidebar-nav">
            <div class="sidebar-menu">
                <button class="sidebar-menu-btn active" data-view="characters">
                    <i class="fa-solid fa-users"></i> 角色卡
                </button>
                <button class="sidebar-menu-btn" data-view="user">
                    <i class="fa-solid fa-user"></i> 用户中心
                </button>
            </div>
        </nav>
        <!-- 退出 -->
        <div class="sidebar-footer">
            <button id="logoutBtn" class="sidebar-logout">
                <i class="fa-solid fa-right-from-bracket"></i> 退出登录
            </button>
        </div>
    </aside>

    <!-- ============ 中间内容区 ============ -->
    <main id="mainContent" class="main-content">
        <!-- 角色卡列表视图 -->
        <section id="viewCharacters" class="view-section active">
            <div class="view-header">
                <h2 class="view-title">选择角色开始对话</h2>
            </div>
            <div id="charList" class="char-list-grid"></div>
            <div id="charListLoading" class="view-loading">加载中...</div>
            <div id="charListEmpty" class="view-empty" style="display:none;">暂无可用角色卡</div>
        </section>

        <!-- 聊天视图 -->
        <section id="viewChat" class="view-section" style="display:none;">
            <!-- 聊天头部 -->
            <div class="chat-header">
                <button class="chat-back-btn" id="chatBackBtn"><i class="fa-solid fa-arrow-left"></i></button>
                <img id="chatCharAvatar" src="img/user-default.png" alt="" class="chat-char-avatar">
                <div class="chat-char-info">
                    <div id="chatCharName" class="chat-char-name">--</div>
                    <div id="chatModelName" class="chat-model-name">--</div>
                </div>
                <div class="chat-header-right">
                    <button class="icon-btn" id="chatSettingsBtn" title="聊天设置"><i class="fa-solid fa-gear"></i></button>
                    <button class="icon-btn" id="chatBgBtn" title="背景设置"><i class="fa-solid fa-image"></i></button>
                </div>
            </div>
            <!-- 聊天历史 -->
            <div id="chatMessages" class="chat-messages"></div>
            <!-- 聊天输入 -->
            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" placeholder="输入消息... (Enter 发送，Ctrl+Enter 换行)" rows="2"></textarea>
                <div class="chat-input-actions">
                    <!-- AI 模型选择 -->
                    <div class="chat-model-selector">
                        <label class="chat-model-label"><i class="fa-solid fa-microchip"></i></label>
                        <select id="paramModel" class="chat-model-select"></select>
                    </div>
                    <!-- 流式传输开关 -->
                    <div class="chat-stream-toggle">
                        <label class="chat-stream-label">
                            <input type="checkbox" id="paramStreaming" checked>
                            <span class="stream-switch"></span>
                            <span class="stream-text">流式</span>
                        </label>
                    </div>
                    <!-- 发送按钮 -->
                    <button id="chatSendBtn" class="chat-send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span>发送</span>
                    </button>
                </div>
            </div>
            <!-- 气泡操作浮层 -->
            <div id="bubbleActions" class="bubble-actions" style="display:none;">
                <button type="button" class="bubble-action-btn" data-action="edit"><i class="fa-solid fa-pen"></i> 编辑</button>
                <button type="button" class="bubble-action-btn" data-action="delete"><i class="fa-solid fa-trash"></i> 删除</button>
                <button type="button" class="bubble-action-btn" data-action="resend"><i class="fa-solid fa-rotate-right"></i> 重新发送</button>
            </div>
            <!-- 自定义确认框（替代原生 confirm，避免阻塞导致宿主 React 渲染循环） -->
            <div id="customConfirm" class="modal-backdrop" style="display:none;">
                <div class="modal-card">
                    <div class="modal-title">操作确认</div>
                    <div class="modal-body" id="customConfirmMessage"></div>
                    <div class="modal-actions">
                        <button type="button" class="modal-btn secondary" id="customConfirmCancel">取消</button>
                        <button type="button" class="modal-btn primary" id="customConfirmOk">确认</button>
                    </div>
                </div>
            </div>
            <!-- 自定义输入框（替代原生 prompt） -->
            <div id="customPrompt" class="modal-backdrop" style="display:none;">
                <div class="modal-card">
                    <div class="modal-title" id="customPromptTitle">请输入</div>
                    <div class="modal-body">
                        <textarea id="customPromptInput" class="modal-input" rows="3"></textarea>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="modal-btn secondary" id="customPromptCancel">取消</button>
                        <button type="button" class="modal-btn primary" id="customPromptOk">确认</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 用户中心视图 -->
        <section id="viewUser" class="view-section" style="display:none;">
            <div class="user-center">
                <h2 class="view-title">用户中心</h2>
                <!-- 基本信息 -->
                <div class="user-card">
                    <div class="user-card-row">
                        <span class="user-card-label">头像</span>
                        <div class="user-card-avatar-wrap">
                            <img id="ucAvatar" src="img/user-default.png" alt="avatar" class="user-card-avatar">
                            <button id="ucAvatarBtn" class="menu_button small">更换</button>
                        </div>
                    </div>
                    <div class="user-card-row">
                        <span class="user-card-label">昵称</span>
                        <span id="ucNickname" class="user-card-value">--</span>
                        <button id="ucNicknameBtn" class="menu_button small">修改</button>
                    </div>
                    <div class="user-card-row">
                        <span class="user-card-label">积分</span>
                        <span id="ucCredits" class="user-card-value credits-value">--</span>
                    </div>
                    <div class="user-card-row">
                        <span class="user-card-label">注册时间</span>
                        <span id="ucCreatedAt" class="user-card-value">--</span>
                    </div>
                </div>
                <!-- 修改密码 -->
                <div class="user-section">
                    <h3 class="user-section-title">修改密码</h3>
                    <div class="user-form">
                        <input id="ucOldPwd" type="password" class="text_pole" placeholder="旧密码">
                        <input id="ucNewPwd" type="password" class="text_pole" placeholder="新密码（6字符以上）">
                        <input id="ucNewPwdConfirm" type="password" class="text_pole" placeholder="确认新密码">
                        <button id="ucPwdBtn" class="menu_button">确认修改</button>
                    </div>
                    <div id="ucPwdMsg" class="form-msg" style="display:none;"></div>
                </div>
                <!-- 消费记录 -->
                <div class="user-section">
                    <h3 class="user-section-title">积分消耗记录</h3>
                    <div id="consumptionList" class="consumption-list"></div>
                    <div id="consumptionPagination" class="pagination"></div>
                    <div id="consumptionLoading" class="view-loading">加载中...</div>
                    <div id="consumptionEmpty" class="view-empty" style="display:none;">暂无消费记录</div>
                </div>
            </div>
        </section>
    </main>

    <!-- ============ 右边栏（属性/详情） ============ -->
    <aside id="rightSidebar" class="right-sidebar" style="display:none;">
        <!-- 角色详情面板 -->
        <div id="rightCharPanel" class="right-panel">
            <div class="right-panel-header">
                <h3>角色信息</h3>
                <button class="panel-close" id="rightPanelClose">&times;</button>
            </div>
            <div class="right-panel-body">
                <img id="rightCharAvatar" src="" alt="" class="right-panel-avatar">
                <h3 id="rightCharName" class="right-panel-name">--</h3>
                <p id="rightCharDesc" class="right-panel-desc"></p>
                <div id="rightCharTags" class="right-panel-tags"></div>
                <div id="rightCharWorldbooks" class="right-panel-wb"></div>
            </div>
        </div>
        <!-- 聊天参数面板 -->
        <div id="rightChatPanel" class="right-panel" style="display:none;">
            <div class="right-panel-header">
                <h3>高级参数</h3>
                <button class="panel-close" id="rightChatPanelClose">&times;</button>
            </div>
            <div class="right-panel-body">
                <!-- 参数滑块 -->
                <div class="param-group">
                    <label class="param-label">上下文长度 (Token) <span id="valCtxLen">2048</span></label>
                    <input type="range" id="paramCtxLen" class="param-range" min="256" max="8192" step="256" value="2048">
                </div>
                <div class="param-group">
                    <label class="param-label">回复长度 (Max Tokens) <span id="valMaxTokens">512</span></label>
                    <input type="range" id="paramMaxTokens" class="param-range" min="64" max="4096" step="64" value="512">
                </div>
                <div class="param-group">
                    <label class="param-label">温度 (Temperature) <span id="valTemp">0.9</span></label>
                    <input type="range" id="paramTemp" class="param-range" min="0.1" max="2.0" step="0.1" value="0.9">
                </div>
                <div class="param-group">
                    <label class="param-label">Top P <span id="valTopP">0.9</span></label>
                    <input type="range" id="paramTopP" class="param-range" min="0.1" max="1.0" step="0.05" value="0.9">
                </div>
                <div class="param-group">
                    <label class="param-label">频率惩罚 <span id="valFreqPen">0.0</span></label>
                    <input type="range" id="paramFreqPen" class="param-range" min="-2.0" max="2.0" step="0.1" value="0.0">
                </div>
                <div class="param-group">
                    <label class="param-label">存在惩罚 <span id="valPresPen">0.0</span></label>
                    <input type="range" id="paramPresPen" class="param-range" min="-2.0" max="2.0" step="0.1" value="0.0">
                </div>
                <div class="param-group">
                    <label class="param-label">推理强度 <span id="valReasoning">0.5</span></label>
                    <input type="range" id="paramReasoning" class="param-range" min="0" max="1" step="0.1" value="0.5">
                </div>
                <button id="paramSaveBtn" class="menu_button">保存参数</button>
            </div>
        </div>
    </aside>

    <!-- 背景选择弹窗 -->
    <div id="bgModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button class="modal-close" id="bgModalClose">&times;</button>
            <h3>选择背景</h3>
            <div id="bgGrid" class="bg-grid"></div>
            <div class="bg-upload">
                <input type="text" id="bgUrlInput" class="text_pole" placeholder="或输入背景图片URL">
                <button id="bgUrlBtn" class="menu_button small">应用</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- 加载遮罩 -->
    <div id="appLoader" class="app-loader">
        <div class="loader-spinner"></div>
        <div>加载中...</div>
    </div>

    <script src="lib/jquery-3.5.1.min.js"></script>
    <script src="lib/toastr.min.js"></script>
    <script type="module" src="scripts/app-api.js"></script>
    <script type="module" src="scripts/app-main.js"></script>
</body>
</html>
