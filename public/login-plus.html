<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - SillyTavern</title>
    <link href="webfonts/NotoSans/stylesheet.css" rel="stylesheet">
    <link href="css/fontawesome.min.css" rel="stylesheet">
    <link href="css/solid.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-page: #121215;
            --bg-card: #1c1c21;
            --bg-input: #25252b;
            --bg-hover: #2e2e35;
            --border: #33333d;
            --border-focus: #7c6af0;
            --text-primary: #ececf0;
            --text-secondary: #9898a8;
            --text-muted: #6a6a78;
            --accent: #7c6af0;
            --accent-hover: #9485f5;
            --accent-glow: rgba(124, 106, 240, 0.2);
            --danger: #e55555;
            --success: #55cc88;
            --radius: 8px;
            --radius-lg: 12px;
        }

        html, body {
            height: 100%;
            font-family: 'Noto Sans', 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(124, 106, 240, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(124, 106, 240, 0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 40px 36px 36px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            height: 56px;
            width: auto;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 12px var(--accent-glow));
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-title i {
            color: var(--accent);
            font-size: 20px;
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.2s ease;
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--bg-input);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg-hover);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .form-input:focus + .input-wrapper i,
        .input-wrapper:focus-within i {
            color: var(--accent);
        }

        .form-error {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            background: rgba(229, 85, 85, 0.1);
            border: 1px solid rgba(229, 85, 85, 0.3);
            border-radius: var(--radius);
            font-size: 13px;
            color: var(--danger);
            margin-top: 4px;
        }

        .form-error.show {
            display: flex;
        }

        .form-error i {
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
            margin-top: 8px;
        }

        .login-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-btn {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .link-btn:hover {
            background: var(--bg-hover);
            color: var(--accent);
            border-color: var(--accent);
        }

        .link-btn i {
            font-size: 12px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 24px;
            font-size: 14px;
            color: var(--text-primary);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: var(--success);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 28px;
            }

            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body class="login">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="img/logo.png" alt="SillyTavern" class="login-logo">
                <h1 class="login-title"><i class="fas fa-sign-in-alt"></i> 欢迎回来</h1>
                <p class="login-subtitle">登录您的账号继续体验</p>
            </div>

            <div class="login-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input id="loginHandle" class="form-input" type="text" placeholder="请输入用户名" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input id="loginPassword" class="form-input" type="password" placeholder="请输入密码" autocomplete="current-password">
                    </div>
                </div>

                <div id="errorMessage" class="form-error">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">错误信息</span>
                </div>

                <button id="loginButton" class="login-btn">
                    <i class="fas fa-arrow-right"></i>
                    <span>登录</span>
                </button>
            </div>

            <div class="login-divider">或</div>

            <div class="login-links">
                <a href="/register" class="link-btn">
                    <i class="fas fa-user-plus"></i>
                    <span>没有账号？立即注册</span>
                </a>
                <a href="/characters" class="link-btn">
                    <i class="fas fa-users"></i>
                    <span>浏览角色卡</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="lib/jquery-3.5.1.min.js"></script>
    <script type="module" src="scripts/app-api.js"></script>
    <script type="module">
        import api, { authApi } from './scripts/app-api.js';

        const $err = $('#errorMessage');
        const $errText = $('#errorText');
        const $btn = $('#loginButton');
        const $toast = $('#toast');

        // 初始化 CSRF Token
        try {
            await api.ensureCsrfToken();
        } catch (e) {
            console.warn('CSRF init failed:', e);
        }

        function showError(msg) {
            $errText.text(msg);
            $err.addClass('show');
            setTimeout(() => $err.removeClass('show'), 4000);
        }

        function showToast(msg, type = '') {
            $toast.text(msg).removeClass('success error').addClass(type).addClass('show');
            setTimeout(() => $toast.removeClass('show'), 3000);
        }

        function setLoading(loading) {
            if (loading) {
                $btn.prop('disabled', true).html('<span class="spinner"></span><span>登录中...</span>');
            } else {
                $btn.prop('disabled', false).html('<i class="fas fa-arrow-right"></i><span>登录</span>');
            }
        }

        // 检查是否已登录
        async function checkLoggedIn() {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                if (data.authed) {
                    window.location.href = '/app';
                }
            } catch (e) {}
        }
        checkLoggedIn();

        $('#loginButton').on('click', async () => {
            $err.removeClass('show');
            const handle = $('#loginHandle').val().trim();
            const password = $('#loginPassword').val();
            if (!handle || !password) return showError('用户名和密码不能为空');

            setLoading(true);
            try {
                const data = await authApi.login({ handle, password });
                if (data.success) {
                    showToast('登录成功，正在跳转...', 'success');
                    setTimeout(() => window.location.href = '/app', 600);
                } else {
                    showError(data.error || '登录失败');
                    setLoading(false);
                }
            } catch (e) {
                showError('网络错误：' + e.message);
                setLoading(false);
            }
        });

        $('#loginHandle, #loginPassword').on('keydown', function(e) {
            if (e.key === 'Enter') $('#loginButton').trigger('click');
        });
    </script>
</body>
</html>
